<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Архивы Сыщика: Настоящий Детектив</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0c10; color: #c5c6c7; overflow-y: auto; }
        
        /* ГЛАВНОЕ МЕНЮ */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100%; display: flex; flex-direction: column; }
        .header-title { text-align: center; margin: 20px 0; font-size: 26px; color: #66fcf1; font-weight: 800; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .card { background: #1f2833; border: 1px solid #45f3ff33; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .card.active:hover { border-color: #66fcf1; background: #24303f; }
        .card.locked { opacity: 0.3; cursor: not-allowed; }
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-title { font-size: 14px; font-weight: bold; color: #fff; }

        /* ИГРОВОЙ ЭКРАН */
        #game-screen { display: none; flex-direction: column; height: 100vh; }
        .top-nav { background: #1f2833; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #66fcf1; }
        .btn { background: #0b0c10; border: 1px solid #66fcf1; color: #66fcf1; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn:hidden { display: none; }
        .btn-danger { color: #fc4445; border-color: #fc4445; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* ВКЛАДКИ ПОИСКА УЛИК */
        .search-zones { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .zone-box { background: #1f2833; border-left: 4px solid #45f3ff; border-radius: 6px; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .zone-box.searched { border-left-color: #1f2833; opacity: 0.7; background: #1a212a; }
        .zone-name { font-weight: bold; color: #fff; }
        .zone-status { font-size: 12px; color: #66fcf1; }

        /* ДОПРОС */
        .suspect-item { background: #1f2833; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .suspect-meta strong { color: #fff; font-size: 15px; display: block; }
        .suspect-meta span { font-size: 12px; color: #a4b0be; }
        
        .chat-box { background: #151a22; border: 1px solid #66fcf1; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .chat-text { font-style: italic; font-size: 14px; margin-bottom: 15px; line-height: 1.4; }
        .chat-options button { display: block; width: 100%; background: #1f2833; border: 1px solid #45f3ff44; color: #fff; padding: 10px; margin-bottom: 8px; border-radius: 6px; text-align: left; font-size: 13px; cursor: pointer; }
        .chat-options button:hover { background: #24303f; border-color: #66fcf1; }

        /* ОБВИНЕНИЕ */
        .accuse-item { background: #1f2833; border: 2px solid transparent; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; }
        .accuse-item h4 { color: #fff; margin-bottom: 3px; }
        .accuse-item p { font-size: 12px; }
        .accuse-item.selected { border-color: #fc4445; background: #2d1f22; }

        /* СНИЗУ ПАНЕЛЬ ОБЩАЯ */
        .tabs-menu { background: #1f2833; display: flex; height: 55px; border-top: 1px solid #2d3748; }
        .tab-btn { flex: 1; background: none; border: none; color: #a4b0be; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .tab-btn.active { color: #66fcf1; background: #151a22; font-weight: bold; }
        .tab-btn span { font-size: 18px; margin-bottom: 2px; }

        /* ЭКРАН РЕЗУЛЬТАТОВ */
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,12,16,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .res-status { font-size: 24px; font-weight: 900; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="container">
        <h1 class="header-title">🔐 СЛЕДСТВЕННЫЙ КОМИТЕТ</h1>
        <div class="grid" id="menu-grid"></div>
    </div>

    <div id="game-screen">
        <div class="top-nav">
            <button class="btn" onclick="exitToMenu()">← Меню</button>
            <span id="case-title" style="color: #fff; font-weight: bold; font-size: 14px;">Дело</span>
            <span id="global-counter" style="color: #66fcf1; font-size: 13px; font-weight: bold;">Улики: 0/5</span>
        </div>

        <div class="main-content" id="tab-evidence-content">
            <h3 style="color:#fff; margin-bottom:12px; font-size:15px;">Осмотр локации преступления:</h3>
            <div class="search-zones" id="zones-list"></div>
        </div>

        <div class="main-content" id="tab-suspects-content" style="display:none;">
            <h3 style="color:#fff; margin-bottom:12px; font-size:15px;">Допрос подозреваемых лиц (4 человека):</h3>
            <div id="suspects-list"></div>
            <div class="chat-box" id="interrogation-box" style="display:none;">
                <h4 id="chat-name" style="color:#66fcf1; margin-bottom:5px;">Имя</h4>
                <div class="chat-text" id="chat-text">Приветствие...</div>
                <div class="chat-options" id="chat-options"></div>
            </div>
        </div>

        <div class="main-content" id="tab-accuse-content" style="display:none;">
            <h3 style="color:#fff; margin-bottom:5px; font-size:15px;">Передача дела в суд:</h3>
            <p style="font-size:12px; margin-bottom:15px; color:#a4b0be;">Внимательно изучите показания. Ошибка оправдает убийцу.</p>
            <div id="accuse-list"></div>
            <button class="btn btn-danger" style="width:100%; padding:14px; font-size:15px; margin-top:10px;" onclick="submitVerdict()">ОБЪЯВИТЬ ОФИЦИАЛЬНЫЙ ВЕРДИКТ</button>
        </div>

        <div class="tabs-menu">
            <button class="tab-btn active" id="btn-ev" onclick="switchTab('evidence')"><span>🔍</span>Место</button>
            <button class="tab-btn" id="btn-su" onclick="switchTab('suspects')"><span>💬</span>Допрос</button>
            <button class="tab-btn" id="btn-ac" onclick="switchTab('accuse')"><span>⚖️</span>Суд</button>
        </div>
    </div>

    <div id="result-modal">
        <div class="res-status" id="res-title">ПОБЕДА</div>
        <p id="res-text" style="max-width:450px; line-height:1.5; margin-bottom:25px; color:#a4b0be; font-size:14px;"></p>
        <button class="btn" style="padding:12px 30px;" onclick="closeResultModal()">Продолжить</button>
    </div>

    <script>
        let unlockedCase = 1;
        let currentCaseId = 1;
        let activeSuspectId = null;
        let selectedAccusedId = null;
        
        let evidenceFound = { 1: false, 2: false, 3: false, 4: false, 5: false };

        const casesDB = {
            1: {
                title: "Похищение кубка лорда", icon: "🏆", killer: "page",
                zones: [
                    { id: 1, name: "Около витрины", clue: "🏆 Золотой кубок со странным белым налетом мышьяка на донышке.", found: false },
                    { id: 2, name: "Ковёр у кровати", clue: "⚙️ Профессиональная воровская отмычка, брошенная в спешке.", found: false },
                    { id: 3, name: "Каминный зев", clue: "📜 Обгоревший обрывок долговой расписки на имя слуги Филиппа.", found: false },
                    { id: 4, name: "Окно на террасу", clue: "🪟 Замок окна цел, его открыли изнутри комнаты.", found: false },
                    { id: 5, name: "Ящик стола", clue: "🔑 Дубликат ключей от покоев, спрятанный под бумагами.", found: false }
                ],
                suspects: [
                    { id: "smith", name: "Кузнец Бьерн", role: "Делал замки во дворце", intro: '"Я ковал железо всю ночь в цеху. Мои отмычки всегда под замком!"' },
                    { id: "lady", name: "Леди Элеонора", role: "Супруга потерпевшего", intro: '"Кубок — наша реликвия. Я спала в соседнем крыле и ничего не слышала."' },
                    { id: "guard", name: "Капитан Гилберт", role: "Начальник ночной стражи", intro: '"Окна террасы проверялись лично мной вечером, всё было на засовах!"' },
                    { id: "page", name: "Слуга Филипп", role: "Личный паж лорда", intro: '"Я просто разносил вино господам. Я нищий слуга, зачем мне кубок?"' }
                ]
            },
            2: {
                title: "Тайна подпольного цеха", icon: "⚔️", killer: "merchant",
                zones: [
                    { id: 1, name: "Точильный камень", clue: "⚔️ Обломок дорогого кинжала с клеймом купеческой гильдии.", found: false },
                    { id: 2, name: "Угольный склад", clue: "💰 Мешочек со свежеотчеканенными фальшивыми монетами.", found: false },
                    { id: 3, name: "Пол у наковальни", clue: "🩸 Засохшие капли крови, ведущие к выходу на задний двор.", found: false },
                    { id: 4, name: "Рабочий фартук", clue: "🧵 Следы дорогой шелковой нити, застрявшей в грубой коже фартука.", found: false },
                    { id: 5, name: "Полка с чертежами", clue: "📜 Записка с угрозами: «Срок до пятницы, или цех сгорит»", found: false }
                ],
                suspects: [
                    { id: "apprentice", name: "Ученик Ганс", role: "Помощник мастера", intro: '"Я ушел спать рано. Мастер оставался работать один."' },
                    { id: "merchant", name: "Купец Олаф", role: "Главный поставщик сырья", intro: '"Мастер задолжал мне за шелк и металл. Но убивать его? Бизнес так не ведут!"' },
                    { id: "monk", name: "Монах Иероним", role: "Местный лекарь-травник", intro: '"Я пришел заказать ступку, но нашел лишь остывающее тело."' },
                    { id: "guard2", name: "Патрульный стражник", role: "Охрана квартала", intro: '"Ночью в переулке было тихо, только купеческая карета проезжала около полуночи."' }
                ]
            }
            // Вы можете легко дублировать блоки для дел 3-8 по аналогии
        };

        // Заполнение меню дел (автогенерация оставшихся 6 дел для объема)
        for (let i = 3; i <= 8; i++) {
            casesDB[i] = {
                title: `Архивное дело №${i}`, icon: "📁", killer: "suspect_1",
                zones: [
                    { id: 1, name: "Письменный стол", clue: "📜 Секретная шифровка заговорщиков.", found: false },
                    { id: 2, name: "Угол под ковром", clue: "🔑 Потерянный ключ от архива.", found: false },
                    { id: 3, name: "Полка шкафа", clue: "🧪 Пустой флакон из-под снотворного.", found: false },
                    { id: 4, name: "Пол у двери", clue: "👣 Грязный след от сапога большого размера.", found: false },
                    { id: 5, name: "Тайник в стене", clue: "💰 Горсть старых золотых монет.", found: false }
                ],
                suspects: [
                    { id: "suspect_1", name: "Подозреваемый А", role: "Служащий замка", intro: '"Я выполнял свои обязанности и ничего подозрительного не видел."' },
                    { id: "suspect_2", name: "Подозреваемый Б", role: "Гость из столицы", intro: '"Я прибыл только на этой неделе, здешние дела меня не касаются."' },
                    { id: "suspect_3", name: "Подозреваемый В", role: "Местный торговец", intro: '"Моя лавка закрывается на закате, я спал дома."' },
                    { id: "suspect_4", name: "Подозреваемый Г", role: "Ночной дворник", intro: '"Ночь была темной, шел сильный дождь, на улице пусто."' }
                ]
            };
        }

        function initMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const c = casesDB[i];
                const isLocked = i > unlockedCase;
                const el = document.createElement('div');
                el.className = `card ${isLocked ? 'locked' : 'active'}`;
                el.innerHTML = `
                    <div class="card-icon">${isLocked ? '🔒' : c.icon}</div>
                    <div class="card-title">${isLocked ? 'Заблокировано' : c.title}</div>
                `;
                if (!isLocked) el.onclick = () => startCase(i);
                grid.appendChild(el);
            }
        }

        function startCase(id) {
            currentCaseId = id;
            evidenceFound = { 1: false, 2: false, 3: false, 4: false, 5: false };
            selectedAccusedId = null;
            activeSuspectId = null;
            
            document.getElementById('case-title').innerText = casesDB[id].title;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            updateEvidenceCounter();
            renderZones();
            renderSuspects();
            switchTab('evidence');
            document.getElementById('interrogation-box').style.display = 'none';
        }

        function switchTab(tab) {
            document.getElementById('tab-evidence-content').style.display = tab === 'evidence' ? 'block' : 'none';
            document.getElementById('tab-suspects-content').style.display = tab === 'suspects' ? 'block' : 'none';
            document.getElementById('tab-accuse-content').style.display = tab === 'accuse' ? 'block' : 'none';
            
            document.getElementById('btn-ev').className = `tab-btn ${tab === 'evidence' ? 'active' : ''}`;
            document.getElementById('btn-su').className = `tab-btn ${tab === 'suspects' ? 'active' : ''}`;
            document.getElementById('btn-ac').className = `tab-btn ${tab === 'accuse' ? 'active' : ''}`;
        }

        function renderZones() {
            const list = document.getElementById('zones-list');
            list.innerHTML = '';
            casesDB[currentCaseId].zones.forEach(z => {
                const box = document.createElement('div');
                box.className = `zone-box ${evidenceFound[z.id] ? 'searched' : ''}`;
                box.innerHTML = `
                    <div class="zone-name">${z.name}</div>
                    <div class="zone-status">${evidenceFound[z.id] ? 'Изучено ✔' : 'Обыскать'}</div>
                `;
                box.onclick = () => searchZone(z.id, z.clue);
                list.appendChild(box);
            });
        }

        function searchZone(id, clueText) {
            if (evidenceFound[id]) {
                alert(`Вы уже находили здесь: \n\n${clueText}`);
                return;
            }
            evidenceFound[id] = true;
            updateEvidenceCounter();
            renderZones();
            alert(`🕵️ Найдена улика! \n\n${clueText}`);
        }

        function updateEvidenceCounter() {
            let total = Object.values(evidenceFound).filter(Boolean).length;
            document.getElementById('global-counter').innerText = `Улики: ${total} / 5`;
        }

        function renderSuspects() {
            const list = document.getElementById('suspects-list');
            const accList = document.getElementById('accuse-list');
            list.innerHTML = '';
            accList.innerHTML = '';

            casesDB[currentCaseId].suspects.forEach(s => {
                // Обычный список допроса
                const row = document.createElement('div');
                row.className = 'suspect-item';
                row.innerHTML = `
                    <div class="suspect-meta"><strong>${s.name}</strong><span>${s.role}</span></div>
                    <button class="btn" onclick="startInterrogation('${s.id}')">Допросить</button>
                `;
                list.appendChild(row);

                // Список для обвинения
                const accRow = document.createElement('div');
                accRow.className = 'accuse-item';
                accRow.id = `accuse-card-${s.id}`;
                accRow.innerHTML = `<h4>${s.name}</h4><p>${s.role}</p>`;
                accRow.onclick = () => selectAccused(s.id);
                accList.appendChild(accRow);
            });
        }

        function startInterrogation(id) {
            activeSuspectId = id;
            const s = casesDB[currentCaseId].suspects.find(p => p.id === id);
            
            document.getElementById('interrogation-box').style.display = 'block';
            document.getElementById('chat-name').innerText = s.name;
            document.getElementById('chat-text').innerText = s.intro;
            
            const options = document.getElementById('chat-options');
            options.innerHTML = '';

            // Базовый вопрос
            let b1 = document.createElement('button');
            b1.innerText = "Где вы были во время совершения преступления?";
            b1.onclick = () => {
                document.getElementById('chat-text').innerText = '"Я уже говорил вам, детектив. У меня железное алиби, проверяйте кого-нибудь другого!"';
            };
            options.appendChild(b1);

            // Динамический вопрос, если найдены ключевые улики (для Дела 1)
            if (currentCaseId === 1 && id === 'page' && evidenceFound[3]) {
                let b2 = document.createElement('button');
                b2.innerText = "⚠️ [Предъявить Долговую Расписку]";
                b2.style.borderColor = "#fc4445";
                b2.onclick = () => {
                    document.getElementById('chat-text').innerText = '"(Нервничает, бледнеет) Откуда у вас... Да, у меня долги! Но это не повод обвинять меня в краже кубка!"';
                };
                options.appendChild(b2);
            }

            // Динамический вопрос для Дела 2
            if (currentCaseId === 2 && id === 'merchant' && evidenceFound[1]) {
                let b2 = document.createElement('button');
                b2.innerText = "⚠️ [Показать обломок Кинжала Гильдии]";
                b2.style.borderColor = "#fc4445";
                b2.onclick = () => {
                    document.getElementById('chat-text').innerText = '"Да, это нож нашей торговой палаты. Я потерял его... Или у меня его украли! Вы ничего не докажете!"';
                };
                options.appendChild(b2);
            }
        }

        function selectAccused(id) {
            selectedAccusedId = id;
            document.querySelectorAll('.accuse-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`accuse-card-${id}`).classList.add('selected');
        }

        function submitVerdict() {
            if (!selectedAccusedId) {
                alert("Сначала выберите, кому предъявить официальное обвинение!");
                return;
            }

            let totalClues = Object.values(evidenceFound).filter(Boolean).length;
            const modal = document.getElementById('result-modal');
            const title = document.getElementById('res-title');
            const text = document.getElementById('res-text');

            if (totalClues < 5) {
                title.innerText = "⚖️ ДЕЛО ОТКЛОНЕНО СУДОМ";
                title.style.color = "#e67e22";
                text.innerText = `Вы собрали всего ${totalClues} из 5 необходимых вещественных доказательств. Судья посчитал доводы следствия неубедительными. Вернитесь на место и обыщите все зоны до конца!`;
                modal.style.display = 'flex';
                return;
            }

            const currentCase = casesDB[currentCaseId];
            if (selectedAccusedId === currentCase.killer) {
                title.innerText = "🏆 ПРАВОСУДИЕ ТОРЖЕСТВУЕТ!";
                title.style.color = "#66fcf1";
                text.innerText = "Блестящая победа! На основе собранных вами 5 неопровержимых улик и показаний свидетелей, подсудимый сознался прямо на заседании суда. Следующая папка в архиве раскрыта.";
                if (currentCaseId === unlockedCase && unlockedCase < 8) {
                    unlockedCase++;
                }
            } else {
                title.innerText = "❌ СУДЕБНАЯ ОШИБКА";
                title.style.color = "#fc4445";
                text.innerText = "Вы обвинили невиновного. Адвокаты легко разбили вашу теорию, а настоящий убийца успел сжечь оставшиеся документы и скрылся из страны. Попробуйте пройти дело заново.";
            }
            modal.style.display = 'flex';
        }

        function closeResultModal() {
            document.getElementById('result-modal').style.display = 'none';
            exitToMenu();
        }

        function exitToMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            initMenu();
        }

        initMenu();
    </script>
</body>
</html>
